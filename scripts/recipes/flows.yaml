name: flows
output_dir: flows
flows:
  - name: flow_list
    description: The list of all flows
    required: true
    steps:
      - navigate: /flow
      - wait: '[data-testid="flow-list"]'
      - snap: flows_list.png

  - name: flow_create
    description: The create flow dialog
    required: false
    steps:
      - navigate: /flow
      - wait: '[data-testid="flow-list"]'
      - click: '[data-testid="newItemButton"]'
      - wait_text: Create Flow
      - snap: flows_create_dialog.png

  - name: flow_editor
    description: The flow editor canvas (requires an existing flow)
    required: false
    steps:
      - navigate: /flow
      - wait: '[data-testid="flow-list"]'
      - click: '[data-testid="configure-icon"]'
      - sleep: 2000
      - snap: flows_editor_canvas.png
